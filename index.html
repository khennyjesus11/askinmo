<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img class="mylogo" src="https://www.askinspo.com/assets/Inspo%20Logo%20white%202-Craw4Yae.svg" alt="logo">
    <div class="login-container">
        <h2>Welcome back</h2>
        <p>Enter your details to access your account</p>
        <form id="loginForm">

            <div class="input-group">
                <label for="Email">Email</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <div class="input-group">
                 <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>

            <span class="password-icon" id="password-icon" onclick="document.getElementById('password-icon').innerHTML='password-icon'">👁️‍🗨️</span>
        </form>
        <button type="submit" id="signinBtn" onclick="document.getElementById('signinBtn').innerHTML='loading...'">Sign in</button>

        <div>
            <a href="#">Forgot Password?</a> <a href="#">Internship Portal</a> <br> <a href="#">Create an account</a>
        </div>
    </div>
</body>
</html>
